<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Entry Form</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="container">
        <div class="card animate-fade">
            <h2>👨‍🎓 Student Entry Form</h2>
            <p class="subtitle">Enter your academic details</p>
            
            <form method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="usn">📌 USN</label>
                        <input type="text" id="usn" name="usn" placeholder="Enter your USN" required>
                    </div>
                    <div class="form-group">
                        <label for="name">👤 Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label style="color: #667eea; font-weight: 700; margin: 20px 0 10px 0; display: block;">📘 Subject Details</label>
                </div>
                
                {% for i in range(1,6) %}
                <div class="form-row">
                    <div class="form-group">
                        <label for="sub{{i}}">Subject {{i}}</label>
                        <input type="text" id="sub{{i}}" name="sub{{i}}" placeholder="Enter subject name" required>
                    </div>
                    <div class="form-group">
                        <label for="m{{i}}">Marks (0-100)</label>
                        <input type="number" id="m{{i}}" name="m{{i}}" placeholder="Enter marks" min="0" max="100" required>
                    </div>
                </div>
                {% endfor %}
                
                <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">✅ Submit</button>
                <a href="/" style="display: block; text-align: center; margin-top: 15px;">← Back to Home</a>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
    <script>
        particlesJS("particles-js", {
            particles: {
                number: { value: 80 },
                size: { value: 4 },
                move: { speed: 2 },
                line_linked: { enable: true, distance: 150, opacity: 0.3, color: "#fff" },
                color: { value: "#ffffff" }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "repulse" },
                    onclick: { enable: true, mode: "push" }
                }
            }
        });
    </script>
</body>
</html>
